<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Race Simulation POC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      padding: 28px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header { margin-bottom: 20px; }
    .header h1 { font-size: 1.3rem; color: #fff; margin-bottom: 4px; }
    .header p  { color: #64748b; font-size: 0.82rem; }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.72rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input, .field select {
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.85rem;
      width: 80px;
    }
    .btn {
      border: none; border-radius: 6px;
      padding: 8px 20px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e10600; color: #fff; }
    .btn-ghost   { background: #374151; color: #d1d5db; }

    /* ── Progress ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 0.82rem;
      color: #64748b;
    }
    .progress-bar-wrap {
      flex: 1;
      background: #1e2130;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #e10600;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s;
    }

    /* ── Performance panel ── */
    .perf-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .perf-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 16px;
      text-align: center;
      min-width: 130px;
    }
    .perf-card .plabel { font-size: 0.68rem; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .perf-card .pval   { font-size: 1.1rem; font-weight: 700; color: #f8fafc; }
    .perf-card .pval.good { color: #22c55e; }
    .perf-card .pval.warn { color: #facc15; }

    /* ── Determinism badge ── */
    .det-badge {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      display: inline-block;
    }
    .det-badge.ok      { background: #052e16; color: #86efac; border: 1px solid #16a34a; }
    .det-badge.fail    { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
    .det-badge.pending { background: #1e293b; color: #64748b; border: 1px solid #334155; }

    /* ── Timing table ── */
    .table-wrap {
      overflow-x: auto;
      background: #0f1117;
      border: 1px solid #1e2130;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      table-layout: fixed; /* estável — colunas não recalculam a cada re-render */
    }

    thead th {
      background: #1a1f35;
      color: #64748b;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid #2d3148;
    }

    tbody tr { border-bottom: 1px solid #141824; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #141824; }

    tbody td {
      padding: 7px 12px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Larguras fixas por coluna (7 colunas) */
    th:nth-child(1), td:nth-child(1) { width: 62px;  }  /* POS (+ bandeira 🏁) */
    th:nth-child(2), td:nth-child(2) { width: 92px;  }  /* PILOTO (bandeira + código) */
    th:nth-child(3), td:nth-child(3) { width: 56px;  }  /* VOLTA */
    th:nth-child(4), td:nth-child(4) { width: 110px; }  /* MELHOR VOLTA */
    th:nth-child(5), td:nth-child(5) { width: 90px;  }  /* GAP */
    th:nth-child(6), td:nth-child(6) { width: auto;  }  /* MINI-SETORES */
    th:nth-child(7), td:nth-child(7) { width: 110px; }  /* ÚLTIMA VOLTA */

    .td-pos    { color: #64748b; font-weight: 700; }
    .td-driver { font-weight: 700; color: #f8fafc; letter-spacing: 0.03em; }
    .td-lap    { color: #94a3b8; }
    .td-time   { color: #e2e8f0; font-family: monospace; }
    .td-fastest-lap { color: #a855f7; font-weight: 700; }  /* recorde de volta — roxo */
    .td-gap    { color: #facc15; font-family: monospace; }
    .td-gap.leader { color: #64748b; }
    .td-sector { color: #7c3aed; font-family: monospace; }

    .pos-medal-1 { color: #fbbf24; }
    .pos-medal-2 { color: #94a3b8; }
    .pos-medal-3 { color: #b45309; }

    /* ── Lap nav ── */
    .lap-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.82rem;
      color: #64748b;
    }
    .lap-nav button {
      background: #1e2130;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 5px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .lap-nav button:disabled { opacity: 0.35; cursor: default; }
    .lap-nav .lap-label { font-weight: 700; color: #e2e8f0; min-width: 80px; text-align: center; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #475569;
      font-size: 0.85rem;
    }

    /* ── Track panel ── */
    .track-panel {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .track-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }
    .track-name { font-size: 1rem; font-weight: 700; color: #fff; }
    .track-country { font-size: 0.8rem; color: #64748b; }
    .track-laps { font-size: 0.78rem; color: #475569; margin-left: auto; }
    .difficulty-badge {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .difficulty-badge.easy   { background: #14532d; color: #86efac; }
    .difficulty-badge.medium { background: #422006; color: #fcd34d; }
    .difficulty-badge.hard   { background: #450a0a; color: #fca5a5; }

    .track-groups {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .attr-group { }
    .attr-group-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 8px;
    }
    .attr-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .attr-label {
      font-size: 0.72rem;
      color: #94a3b8;
      width: 140px;
      flex-shrink: 0;
    }
    .attr-bar-wrap {
      flex: 1;
      background: #0f1117;
      border-radius: 3px;
      height: 5px;
      overflow: hidden;
    }
    .attr-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .attr-val {
      font-size: 0.68rem;
      color: #64748b;
      width: 16px;
      text-align: right;
    }
    /* ── Mini-sector bar ── */
    .mini-bar {
      display: flex;
      gap: 2px;
      align-items: center;
    }
    .mini-bar-group {
      display: flex;
      gap: 1px;
    }
    .mini-bar-sep {
      width: 4px;
      flex: none;
    }
    .ms-cell {
      width: 10px;
      height: 8px;
      border-radius: 1px;
      background: #1e2130;
      flex: none;
    }
    /* Colors by relative performance within the column */
    .ms-fastest  { background: #7c3aed; }   /* purple — best across all drivers */
    .ms-fast     { background: #22c55e; }   /* green */
    .ms-mid      { background: #facc15; }   /* yellow */
    .ms-slow     { background: #f97316; }   /* orange */
    .ms-slowest  { background: #ef4444; }   /* red */
    .ms-empty    { background: #1e2130; }   /* not yet completed */
    .ms-run      { background: #475569; }   /* mini percorrido, setor em andamento */

    .td-mini { padding: 7px 8px; }
    /* Fixed-width slot so the bar never shifts when the sector time appears */
    .sector-time {
      display: inline-block;
      width: 52px;
      font-family: monospace;
      font-size: 0.72rem;
      color: #64748b;
      margin-left: 4px;
      text-align: left;
    }

    /* ── Track map ── */
    .track-map-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
    }
    #trackCanvas {
      display: block;
      width: 100%;
      height: auto;
      background: #0f1117;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>F1 Race Simulation — POC</h1>
  <p id="headerSub">20 pilotos · tick fixo · simulação instantânea</p>
</div>

<!-- Controls -->
<div class="controls">
  <div class="field">
    <label>Pista</label>
    <select id="trackSelect" style="width:auto">
      <option value="monaco">🇲🇨 Monaco — Difícil</option>
      <option value="spa">🇧🇪 Spa — Médio</option>
      <option value="interlagos" selected>🇧🇷 Interlagos — Fácil</option>
    </select>
  </div>
  <div class="field">
    <label>Seed</label>
    <input type="number" id="seed" value="42" min="1" max="99999" style="display:none"/>
  </div>
  <button class="btn btn-primary" id="btnRun">▶ Simular Corrida</button>
  <button class="btn btn-ghost"   id="btnReset">↺ Resetar</button>
  <div id="detBadge" class="det-badge pending">Aguardando simulação</div>
</div>

<!-- Track attributes panel -->
<div id="trackPanel" style="margin-bottom:16px"></div>

<!-- Progress -->
<div class="progress-row">
  <span id="progressLabel">—</span>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<!-- Performance -->
<div class="perf-row">
  <div class="perf-card">
    <div class="plabel">Tempo de execução</div>
    <div class="pval" id="perfTime">—</div>
  </div>
  <div class="perf-card">
    <div class="plabel">Total de ticks</div>
    <div class="pval" id="perfTicks">—</div>
  </div>
  <div class="perf-card">
    <div class="plabel">Updates / segundo real</div>
    <div class="pval" id="perfUps">—</div>
  </div>
  <div class="perf-card">
    <div class="plabel">Voltas simuladas</div>
    <div class="pval" id="perfLaps">—</div>
  </div>
</div>

<!-- Lap navigator -->
<div class="lap-nav" id="lapNav" style="display:none">
  <button id="btnPlayPause">▶ Play</button>
  <button id="btnLapPrev" disabled>◀</button>
  <span class="lap-label" id="lapLabel">Volta 1</span>
  <button id="btnLapNext">▶</button>
  <select id="speedSelect" style="margin-left:8px">
    <option value="600">Muito lento (0.6s/mini)</option>
    <option value="300">Lento (0.3s/mini)</option>
    <option value="150">Normal (0.15s/mini)</option>
    <option value="80" selected>Rápido (0.08s/mini)</option>
    <option value="30">Muito rápido</option>
  </select>
</div>

<!-- Track map (2D) -->
<div id="trackMap" class="track-map-card" style="display:none">
  <canvas id="trackCanvas" width="1200" height="520"></canvas>
</div>

<!-- Timing table -->
<div class="table-wrap">
  <table id="timingTable">
    <thead>
      <tr>
        <th>POS</th>
        <th>PILOTO</th>
        <th>VOLTA</th>
        <th>MELHOR VOLTA</th>
        <th>GAP LÍDER</th>
        <th>MINI-SETORES</th>
        <th>ÚLTIMA VOLTA</th>
      </tr>
    </thead>
    <tbody id="timingBody">
      <tr><td colspan="7" class="empty-state">Clique em "Simular Corrida" para começar</td></tr>
    </tbody>
  </table>
</div>

<script src="src/core/rng.js"></script>
<script src="src/core/format.js"></script>
<script src="src/data/tracks.js"></script>
<script src="src/data/drivers.js"></script>
<script src="src/race/constants.js"></script>
<script src="src/race/skills.js"></script>
<script src="src/race/timeline.js"></script>
<script src="src/race/engine.js"></script>
<script src="src/map/geometry.js"></script>
<script src="src/map/mapgraph.js"></script>
<script>
  let snapshots = [];
  let currentLap = 0;
  let lastSeed = null;
  let lastResult = null;

  // Track map animation state
  let trackPath   = null;   // { points, cum, total } do buildTrackPath
  let speedWarp   = null;   // { distCum } — reparametrização tempo→distância p/ frear em curva
  let mapTargetT  = 0;      // tempo-alvo (do líder no frame atual)
  let mapDisplayT = 0;      // tempo de corrida exibido (avança continuamente)
  let mapRAF      = null;   // handle do requestAnimationFrame
  // Segmento de interpolação: displayT desliza de mapSegFrom → mapSegTo em mapSegDur
  // segundos reais (= playSpeed). Taxa derivada por segmento → sem overshoot nem
  // descalibração ao trocar de velocidade.
  let mapSegFrom    = 0;
  let mapSegTo      = 0;
  let mapSegDur     = 0;
  let mapSegElapsed = 0;
  let mapLastFrameMs = 0;   // timestamp do rAF anterior (delta real entre frames)

  const tbody         = document.getElementById('timingBody');
  const progressBar   = document.getElementById('progressBar');
  const progressLabel = document.getElementById('progressLabel');
  const lapNav        = document.getElementById('lapNav');

  // ── Track panel ──────────────────────────────────────────────────────────
  const ATTR_GROUPS = [
    {
      title: 'Layout',
      attrs: [
        ['lowSpeedCorners',    'Curvas lentas'],
        ['mediumSpeedCorners', 'Curvas médias'],
        ['highSpeedCorners',   'Curvas rápidas'],
        ['straights',          'Retas'],
        ['elevationChanges',   'Desnível'],
        ['technicality',       'Tecnicidade'],
      ],
    },
    {
      title: 'Grip & Superfície',
      attrs: [
        ['trackGrip',       'Grip da pista'],
        ['surfaceAbrasion', 'Abrasão'],
        ['bumpiness',       'Irregularidade'],
      ],
    },
    {
      title: 'Ultrapassagem',
      attrs: [
        ['overtakingOpportunities', 'Oportunidades'],
        ['defensiveDifficulty',     'Dificuldade defesa'],
      ],
    },
    {
      title: 'Clima',
      attrs: [
        ['rainProbability',    'Chuva'],
        ['weatherVariability', 'Variabilidade'],
        ['temperatureRange',   'Amplitude térmica'],
      ],
    },
    {
      title: 'Pneus',
      attrs: [
        ['tireDegradation', 'Degradação'],
        ['thermalStress',   'Estresse térmico'],
        ['fuelSensitivity', 'Sensib. combustível'],
      ],
    },
    {
      title: 'Corrida',
      attrs: [
        ['averageSpeed',          'Velocidade média'],
        ['safetyCarProbability',  'Safety Car'],
        ['trackEvolution',        'Evolução da pista'],
      ],
    },
  ];

  function barColor(val) {
    if (val <= 3) return '#22c55e';
    if (val <= 6) return '#facc15';
    return '#ef4444';
  }

  function renderTrackPanel(trackKey) {
    const t   = TRACKS[trackKey];
    const el  = document.getElementById('trackPanel');
    const diffLabel = { easy: 'Fácil', medium: 'Médio', hard: 'Difícil' }[t.difficulty];

    const groups = ATTR_GROUPS.map(g => `
      <div class="attr-group">
        <div class="attr-group-title">${g.title}</div>
        ${g.attrs.map(([key, label]) => {
          const v = t[key];
          return `
            <div class="attr-row">
              <span class="attr-label">${label}</span>
              <div class="attr-bar-wrap">
                <div class="attr-bar" style="width:${v * 10}%;background:${barColor(v)}"></div>
              </div>
              <span class="attr-val">${v}</span>
            </div>`;
        }).join('')}
      </div>`).join('');

    el.innerHTML = `
      <div class="track-panel">
        <div class="track-header">
          <span class="track-name">${t.name}</span>
          <span class="track-country">${t.country}</span>
          <span class="difficulty-badge ${t.difficulty}">${diffLabel}</span>
          <span class="track-laps">${t.laps} voltas · base ${fmtTime(t.baseLap)}</span>
        </div>
        <div class="track-groups">${groups}</div>
      </div>`;
  }

  document.getElementById('trackSelect').addEventListener('change', (e) => {
    renderTrackPanel(e.target.value);
  });

  // Render on load
  renderTrackPanel('interlagos');
  const lapLabel   = document.getElementById('lapLabel');
  const btnLapPrev = document.getElementById('btnLapPrev');
  const btnLapNext = document.getElementById('btnLapNext');

  document.getElementById('btnRun').addEventListener('click', () => {
    const trackKey = document.getElementById('trackSelect').value;

    const t0      = performance.now();
    const result  = runRace(trackKey);
    const elapsed = performance.now() - t0;

    snapshots  = result.sectorSnapshots;  // playback by sector
    lastResult = result;

    // Performance
    const totalTicks = result.track.laps * 3 * 9;
    const ups = Math.round(totalTicks / (elapsed / 1000));

    document.getElementById('perfTime').textContent  = elapsed.toFixed(1) + ' ms';
    document.getElementById('perfTicks').textContent = totalTicks.toLocaleString('pt-BR');
    document.getElementById('perfUps').textContent   = ups.toLocaleString('pt-BR');
    document.getElementById('perfLaps').textContent  = result.track.laps + ' voltas · ' + result.sectorSnapshots.length + ' setores';

    const perfTimeEl = document.getElementById('perfTime');
    perfTimeEl.className = 'pval ' + (elapsed < 50 ? 'good' : elapsed < 200 ? 'warn' : '');

    // Determinism badge
    updateDeterminismBadge(trackKey);

    // Track map — só pistas com traçado real (svgPath) exibem o mapa 2D
    if (result.track.svgPath) {
      trackPath = buildTrackPathFromSVG(result.track.svgPath);
      speedWarp = buildSpeedWarp(trackPath, result.track);
      document.getElementById('trackMap').style.display = 'block';
      startMapAnimation();
    } else {
      stopMapAnimation();
      trackPath = null;
      speedWarp = null;
      document.getElementById('trackMap').style.display = 'none';
    }

    // Playback — 1 setor por segundo
    lapNav.style.display = 'flex';
    startPlayback();
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    stopPlayback();
    stopMapAnimation();
    trackPath = null; speedWarp = null; mapTargetT = 0; mapDisplayT = 0;
    document.getElementById('trackMap').style.display = 'none';
    snapshots = []; currentLap = 0; lastSeed = null; lastResult = null;
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Clique em "Simular Corrida" para começar</td></tr>';
    progressBar.style.width = '0%';
    progressLabel.textContent = '—';
    lapNav.style.display = 'none';
    ['perfTime','perfTicks','perfUps','perfLaps'].forEach(id => document.getElementById(id).textContent = '—');
    document.getElementById('detBadge').className = 'det-badge pending';
    document.getElementById('detBadge').textContent = 'Aguardando simulação';
  });

  btnLapPrev.addEventListener('click', () => { pausePlayback(); if (currentLap > 0) renderTable(--currentLap); });
  btnLapNext.addEventListener('click', () => { pausePlayback(); if (currentLap < snapshots.length - 1) renderTable(++currentLap); });

  // ─── Playback (reprodução volta a volta) ───────────────────────────────────
  let playTimer  = null;
  let playSpeed  = 80; // ms por mini-setor

  function startPlayback() {
    stopPlayback();
    currentLap = 0;
    renderTable(currentLap);
    playTimer = setInterval(() => {
      if (currentLap < snapshots.length - 1) {
        renderTable(++currentLap);
      } else {
        stopPlayback();
      }
    }, playSpeed);
    updatePlayBtn();
  }

  function stopPlayback() {
    if (playTimer) { clearInterval(playTimer); playTimer = null; }
    updatePlayBtn();
  }

  function pausePlayback() { stopPlayback(); }

  function togglePlayback() {
    if (playTimer) {
      stopPlayback();
    } else if (snapshots.length) {
      // Se chegou ao fim, recomeça; senão continua de onde parou
      if (currentLap >= snapshots.length - 1) currentLap = 0;
      playTimer = setInterval(() => {
        if (currentLap < snapshots.length - 1) renderTable(++currentLap);
        else stopPlayback();
      }, playSpeed);
      updatePlayBtn();
    }
  }

  function updatePlayBtn() {
    const btn = document.getElementById('btnPlayPause');
    if (!btn) return;
    btn.textContent = playTimer ? '⏸ Pausar' : '▶ Play';
  }

  document.getElementById('btnPlayPause').addEventListener('click', togglePlayback);

  document.getElementById('speedSelect').addEventListener('change', (e) => {
    playSpeed = parseInt(e.target.value);
    if (playTimer) { // reinicia o timer com a nova velocidade sem perder a volta atual
      clearInterval(playTimer);
      playTimer = setInterval(() => {
        if (currentLap < snapshots.length - 1) renderTable(++currentLap);
        else stopPlayback();
      }, playSpeed);
    }
  });

  // ─── Track map: animação e desenho ─────────────────────────────────────────
  // Lógica pura (buildSpeedWarp, warpLapFraction, driverLapFraction,
  // computeMapTransform) vive em mapgraph.js. Aqui fica só o que depende do DOM.

  // Constrói o traçado a partir de um path SVG real (string `d`), amostrando
  // pontos uniformes com getPointAtLength nativo. Retorna a mesma estrutura
  // {points, cum, total} do buildTrackPath procedural (via normalizePath).
  function buildTrackPathFromSVG(d, samples = 300) {
    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(NS, 'svg');
    const el  = document.createElementNS(NS, 'path');
    el.setAttribute('d', d);
    svg.appendChild(el);
    svg.style.position = 'absolute';
    svg.style.width = '0'; svg.style.height = '0';
    document.body.appendChild(svg);
    const len = el.getTotalLength();
    const raw = [];
    for (let i = 0; i < samples; i++) {
      const p = el.getPointAtLength(len * i / samples);
      raw.push({ x: p.x, y: p.y });
    }
    document.body.removeChild(svg);
    return normalizePath(raw); // vem de sim.js
  }

  function startMapAnimation() {
    mapDisplayT = 0; mapTargetT = 0;
    mapSegFrom = 0; mapSegTo = 0; mapSegDur = 0; mapSegElapsed = 0;
    mapLastFrameMs = 0;
    if (mapRAF) cancelAnimationFrame(mapRAF);
    const loop = (now) => {
      const dt = mapLastFrameMs ? (now - mapLastFrameMs) / 1000 : 0;
      mapLastFrameMs = now;
      if (playTimer) {
        // Desliza dentro do segmento atual (from → to em mapSegDur s reais).
        // Interpolação linear cronometrada: contínua e sem overshoot.
        if (mapSegDur > 0) {
          mapSegElapsed = Math.min(mapSegDur, mapSegElapsed + dt);
          const f = mapSegElapsed / mapSegDur;
          mapDisplayT = mapSegFrom + (mapSegTo - mapSegFrom) * f;
        } else {
          mapDisplayT = mapSegTo;
        }
      } else {
        // Pausado: assenta suave no alvo, sem tremor
        mapDisplayT += (mapTargetT - mapDisplayT) * Math.min(1, dt * 8);
      }
      drawMap(mapDisplayT);
      mapRAF = requestAnimationFrame(loop);
    };
    mapRAF = requestAnimationFrame(loop);
  }

  function stopMapAnimation() {
    if (mapRAF) { cancelAnimationFrame(mapRAF); mapRAF = null; }
  }

  function drawMap(T) {
    const canvas = document.getElementById('trackCanvas');
    if (!canvas || !trackPath || !lastResult) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const { mapX, mapY } = computeMapTransform(canvas, trackPath);

    // Traçado da pista — borda clara + asfalto interno para dar profundidade
    const pts = trackPath.points;
    const drawStroke = (color, width) => {
      ctx.beginPath();
      ctx.moveTo(mapX(pts[0]), mapY(pts[0]));
      for (let i = 1; i < pts.length; i++) ctx.lineTo(mapX(pts[i]), mapY(pts[i]));
      ctx.closePath();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineJoin = 'round';
      ctx.stroke();
    };
    drawStroke('#3a4066', 20);   // borda externa (leve realce)
    drawStroke('#2d3148', 16);   // corpo do traçado
    drawStroke('#11141d', 11);   // asfalto interno escuro

    // Linha de largada — faixa curta perpendicular ao traçado no ponto 0
    const s0 = pointAtLapFraction(trackPath, 0.0);
    const s1 = pointAtLapFraction(trackPath, 0.01);
    const dx = s1.x - s0.x, dy = s1.y - s0.y;
    const dlen = Math.hypot(dx, dy) || 1;
    const nx = -dy / dlen, ny = dx / dlen; // normal
    const half = 9;
    ctx.beginPath();
    ctx.moveTo(mapX(s0) + nx * half, mapY(s0) + ny * half);
    ctx.lineTo(mapX(s0) - nx * half, mapY(s0) - ny * half);
    ctx.strokeStyle = '#f8fafc';
    ctx.lineWidth = 3;
    ctx.setLineDash([3, 3]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Carros — usa a ordem de corrida do frame atual para saber pos/cor
    const frame = snapshots[currentLap];
    const orderByCode = {};
    frame.forEach((d, pos) => { orderByCode[d.code] = pos; });

    // desenha do último pro primeiro para o líder ficar por cima
    const tl = lastResult.timelines;
    const drawList = tl.map(t => {
      const frac = driverLapFraction(t.events, T);
      const p = pointAtLapFraction(trackPath, warpLapFraction(speedWarp, frac));
      return { code: t.code, pos: orderByCode[t.code] ?? 99, p };
    }).sort((a, b) => b.pos - a.pos);

    const maxPos = drawList.reduce((m, d) => Math.max(m, d.pos), 0);
    for (const d of drawList) {
      const x = mapX(d.p), y = mapY(d.p);
      if (d.pos === 0) window.__leaderXY = { x, y }; // exposto para testes de suavidade
      if (d.pos === maxPos) window.__lastXY = { x, y }; // lanterna (testes tail)
      let color = '#94a3b8';                 // resto — slate
      if (d.pos === 0) color = '#7c3aed';    // líder — roxo
      else if (d.pos === 1) color = '#cbd5e1';
      else if (d.pos === 2) color = '#b45309';
      const r = d.pos === 0 ? 7 : 5.5;
      // glow
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = d.pos === 0 ? 14 : 7;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = '#0f1117';
      ctx.stroke();
      // só o líder recebe label — evita mancha de texto quando amontoados
      if (d.pos === 0) {
        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 11px monospace';
        ctx.fillText(d.code, x + 10, y - 8);
      }
    }
  }

  function renderTable(snapIdx) {
    currentLap = snapIdx;
    const totalSnaps = snapshots.length;
    const leaderRow = snapshots[snapIdx][0];
    // Relógio do mapa: usa o MAIOR totalTime do frame, não o do P1. Assim, quando
    // o líder termina a corrida (seu tempo para de crescer nos frames tail), o
    // relógio continua avançando enquanto QUALQUER carro ainda corre — sem congelar.
    let newTarget = 0;
    for (const d of snapshots[snapIdx]) if (d.totalTime > newTarget) newTarget = d.totalTime;
    const jump = Math.abs(newTarget - mapSegTo);
    if (jump > 5) {
      // salto grande (reset/seek/prev/next): reposiciona sem deslizar
      mapDisplayT = newTarget;
      mapSegFrom = newTarget;
    } else {
      mapSegFrom = mapDisplayT;
    }
    mapSegTo      = newTarget;
    mapSegDur     = playSpeed / 1000;
    mapSegElapsed = 0;
    mapTargetT    = newTarget;
    const lapNum    = leaderRow.lap + 1;
    const sectorNum = leaderRow.sector + 1; // current sector (0-indexed → 1-3)
    // count mini-sectors done this lap by the leader
    const minisDone = leaderRow.curMiniTimesPerSector.reduce((a, arr) => a + arr.length, 0);
    lapLabel.textContent = `Volta ${lapNum} · S${sectorNum} · ${minisDone}/27 mini`;
    btnLapPrev.disabled  = snapIdx === 0;
    btnLapNext.disabled  = snapIdx === totalSnaps - 1;

    // Progresso acompanha o playback
    const pct = ((snapIdx + 1) / totalSnaps) * 100;
    progressBar.style.width = pct + '%';
    progressLabel.textContent = `Volta ${lapNum} · Setor ${sectorNum}  (mini ${minisDone}/27)`;

    const rows = snapshots[snapIdx];

    // Fastest lap of the race so far (lowest bestLapTime among all drivers this frame).
    // The driver holding it gets a purple MELHOR VOLTA cell, like F1 live timing.
    let fastestLap = Infinity;
    for (const r of rows) {
      if (r.bestLapTime != null && r.bestLapTime < fastestLap) fastestLap = r.bestLapTime;
    }

    // Each driver's bar shows the CURRENT lap progress, filling one mini-sector
    // at a time. No fallback — a driver who just crossed the line shows an empty
    // bar that fills up again, exactly like real live timing.
    const displayMini = rows.map(r => ({
      mini:    r.curMiniTimesPerSector,
      sectors: r.curSectorTimes,
    }));

    // Cores no modelo LIVE do F1 (pré-computado em sim.js, best acumulado):
    //   Roxo   = global best daquele setor na corrida (recorde)
    //   Verde  = bateu o próprio personal best do setor
    //   Amarelo= ficou atrás do próprio personal best
    // Enquanto o setor está EM ANDAMENTO, os minis já feitos ficam neutros (cinza-
    // claro) até o setor fechar e receber a cor consolidada.
    const sectorColors = lastResult.sectorColors;
    const miniColors = rows.map(() => [[],[],[]]);

    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      for (let s = 0; s < 3; s++) {
        const sectorTime = displayMini[i].sectors[s]; // != null quando o setor fechou
        if (sectorTime != null) {
          // Setor completo → cor única consolidada (lookup pela volta atual)
          const cls = sectorColors[`${r.code}|${r.lap}|${s}`] || 'ms-mid';
          for (let m = 0; m < 9; m++) miniColors[i][s][m] = cls;
          continue;
        }
        // Setor em andamento → minis já percorridos ficam neutros; resto vazio
        const arr = displayMini[i].mini[s];
        for (let m = 0; m < 9; m++) {
          const done = arr && arr[m] != null;
          miniColors[i][s][m] = done ? 'ms-run' : 'ms-empty';
        }
      }
    }

    tbody.innerHTML = rows.map((r, i) => {
      const posClass = i === 0 ? 'pos-medal-1' : i === 1 ? 'pos-medal-2' : i === 2 ? 'pos-medal-3' : '';
      const gapClass = i === 0 ? 'td-gap leader' : 'td-gap';

      // Build mini-sector bar: 3 groups of 9 — using the display lap's sector times
      const miniBar = [0,1,2].map(s => {
        const cells = [0,1,2,3,4,5,6,7,8].map(m =>
          `<div class="ms-cell ${miniColors[i][s][m] || 'ms-empty'}"></div>`
        ).join('');
        // Always render the time slot (fixed width) so the bar never shifts
        const t = displayMini[i].sectors[s];
        const time = `<span class="sector-time">${t != null ? fmtSec(t) : ''}</span>`;
        return `<div class="mini-bar-group">${cells}</div>${time}`;
      }).join('<div class="mini-bar-sep"></div>');

      // Purple highlight if this driver holds the race's fastest lap
      const bestClass = (r.bestLapTime != null && r.bestLapTime <= fastestLap + 1e-9)
        ? 'td-time td-fastest-lap' : 'td-time';

      return `
        <tr>
          <td class="td-pos ${posClass}">${i + 1}${r.finished ? ' 🏁' : ''}</td>
          <td class="td-driver">${DRIVER_FLAG[r.code] || ''} ${r.code}</td>
          <td class="td-lap">${r.lap}</td>
          <td class="${bestClass}">${fmtTime(r.bestLapTime)}</td>
          <td class="${gapClass}">${fmtGap(r.gapToLeader)}</td>
          <td class="td-mini"><div class="mini-bar">${miniBar}</div></td>
          <td class="td-time">${fmtTime(r.lastLapTime)}</td>
        </tr>`;
    }).join('');
  }

  // Com seed aleatória por piloto, cada corrida é única (não-determinística).
  function updateDeterminismBadge(trackKey) {
    const badge = document.getElementById('detBadge');
    badge.className = 'det-badge ok';
    badge.textContent = '🎲 Seed por piloto — cada corrida é única';
  }
</script>
